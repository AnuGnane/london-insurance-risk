project:
  name: uk-insurance-risk
  crs_working: "EPSG:27700"     # British National Grid — use for area/length maths
  crs_display: "EPSG:4326"      # WGS84 — use only for GeoJSON / map output

geography:
  footprint: "gb"               # "gb" | "uk" | "england" | "england_wales" | "london"
  region_code: "E12000007"      # London region (GSS code) — used when footprint=london
  unit: "LSOA"                  # modelling + display unit (LSOA in E+W, DZ in S, SOA in NI)
  lsoa_vintage: "2011"          # matches IMD 2019; Scotland DZ also 2011
  bbox_wgs84: [-8.65, 49.86, 1.77, 60.86]   # UK bbox (was London-only)
  # NI deferred: data.police.uk has no NI crime and STATS19 excludes NI, so an NI
  # area would carry only 2 of 4 features. Add northern_ireland here once an NI
  # crime/collision source is wired (see implementation_plan.md "Defer NI").
  nations:
    - england
    - wales
    - scotland

data_years:
  crime_months_back: 36         # was 12; 36 smooths seasonality (E+W only via data.police.uk)
  stats19_years: [2021, 2022, 2023, 2024]
  traffic_years: [2021, 2022, 2023, 2024]   # DfT LA traffic, aligned to STATS19 window

risk_index:
  normalisation: "percentile"   # percentile | zscore | minmax
  weights:                      # expert defaults; can be back-fit during calibration
    vehicle_crime: 0.40
    road_casualties: 0.30
    deprivation: 0.18
    population_density: 0.12
  severity_weights:             # applied to STATS19 casualties
    slight: 1
    serious: 3
    fatal: 8
  buckets: 5                    # quintiles for the legend
  missing_feature_strategy: "reweight"   # reweight | zero — how to handle NaN features (S/NI crime)

features:
  # Which features are attributed to the PLACE vs the area's demographic COMPOSITION.
  # PLACE features drive the territorial premium; COMPOSITION features are CONTROLS,
  # included so the place coefficients are estimated net of who lives there, then
  # reported separately (NEXT_PHASE_DESIGN.md §2).
  # Phase 3 v2 outcome: point-level AADF traffic intensity REPLACED population_density
  # as a place driver. AADF is a direct measure of local road business (partial r
  # +0.38, p<1e-4, VIF 2.3) whereas density was always a collinear urban-intensity
  # proxy (VIF 13–60, the long-standing "it's just a density model" critique). With
  # AADF in, every premium feature is an independent significant keeper and LOAO MAE
  # fell to ~£89. population_density stays a map diagnostic (via risk_index.weights).
  place:
    - vehicle_crime
    - deprivation
    - aadf_intensity
    # - flood_risk            # Phase 4 candidate — ACTIVATE once data/interim/flood.parquet
    #                         # exists (run src/ingest/flood.py with extents dropped in
    #                         # data/raw/flood/). Adding it before the data exists would make
    #                         # the all-NaN place column drop every calibration row.
  composition:
    - young_driver_share
    - cars_per_household
  # DIAGNOSTICS: ingested + shown on the map, but NOT premium drivers. Phase 3 added
  # DfT traffic exposure and a KSI-per-vehicle-mile collision rate as place
  # CANDIDATES, then let reports/feature_analysis.md gate them (PHASE3_PLAN.md). The
  # evidence excluded both: KSI adds no independent signal once crime/deprivation/
  # density are controlled (partial p≈0.44); traffic_per_capita is an inverse-density
  # proxy (univariate r≈-0.92, VIF≈16, wrong-signed as a "risk" driver — high traffic
  # per resident = rural through-roads/motorways). They stay diagnostics, like the
  # legacy road_casualties, pending point-level AADF exposure (deferred).
  diagnostics:
    - traffic_per_capita
    - ksi_collisions_per_billion_vehicle_miles

calibration:
  panel_csv: "data/manual/wtw_anchors_panel.csv"  # 137-row multi-quarter panel
  method: "ols"                # ols | ridge | lasso
  holdout: true                # run leave-one-area-out CV
  temporal_backtest: true      # fit on quarters ≤T, predict T+1
  quarter_fixed_effects: true  # control for national premium trend
  cluster_by: "area_name"      # cluster SEs by area (repeated measures)
  feature_basis: "percentile"  # raw | percentile — percentile (0–100) bounds LSOA-grain
                               # extrapolation; raw units blow up on outlier LSOAs (see MODEL_REVIEW.md §3.2)
  response: "relative_index"   # relative_index (area premium ÷ national avg, modelled in log) |
                               # absolute_gbp. relative_index isolates the spatial effect (the project goal).
  # The premium model fits features.place (drivers) + features.composition (controls).
  # premium_features is only a fallback if features.place is absent — kept in sync.
  premium_features:
    - vehicle_crime
    - deprivation
    - aadf_intensity

sources:
  police_api: "https://data.police.uk/api"
  stats19_landing: "https://www.data.gov.uk/dataset/cb7ae6f0-4be6-4935-9277-47e5ce24a11f/road-accidents-safety-data"
  road_traffic_downloads: "https://roadtraffic.dft.gov.uk/downloads"
  # Point-level count-point AADF (Phase 3 v2 — local traffic intensity near each area).
  road_traffic_aadf: "https://storage.googleapis.com/dft-statistics/road-traffic/downloads/data-gov-uk/dft_traffic_counts_aadf.zip"
  # Flood risk (Phase 4) — within-nation, High+Medium extents. Large layers / mixed
  # access (some behind ESRI REST/WMS), so flood.py reads pre-fetched extents from
  # data/raw/flood/<nation>/. See PHASE4_PLAN.md.
  flood_england_rofrs: "https://environment.data.gov.uk/dataset/96ab4342-82c1-4095-87f1-0082e8d84ef1"
  flood_scotland_sepa: "https://www2.sepa.scot/flooddata/"
  flood_wales_nrw: "https://datamap.gov.wales/"
  imd2019: "https://www.gov.uk/government/statistics/english-indices-of-deprivation-2019"
  geoportal: "https://geoportal.statistics.gov.uk"
  wtw_index: "https://www.confused.com/car-insurance/price-index"
  # Scotland recorded crime (data.police.uk has no Scottish coverage). "Theft of/from
  # a motor vehicle" by council area, latest year, disaggregated to Data Zone by
  # population. Linked-data cube queried over SPARQL.
  scotland_crime_sparql: "https://statistics.gov.scot/sparql"
  # Scotland Census 2022 demographic controls, published on 2011 Data Zones (so no
  # 2022->2011 crosswalk is needed) and hosted as CSV by the UK Data Service.
  # UV103 = age by single year; UV405 = car or van availability.
  scotland_census_age_csv: "https://s3-eu-west-1.amazonaws.com/statistics.digitalresources.jisc.ac.uk/dkan/files/2022/NRS/UV103/census_2022_UV103_age_Data_Zone_2011.csv"
  scotland_census_cars_csv: "https://s3-eu-west-1.amazonaws.com/statistics.digitalresources.jisc.ac.uk/dkan/files/2022/NRS/UV405/Census_2022_UV405_Car_or_van_availability_Data_Zone_2011.csv"

paths:
  raw: "data/raw"
  interim: "data/interim"
  processed: "data/processed"
  manual: "data/manual"
