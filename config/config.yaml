project:
  name: uk-insurance-risk
  crs_working: "EPSG:27700"     # British National Grid — use for area/length maths
  crs_display: "EPSG:4326"      # WGS84 — use only for GeoJSON / map output

geography:
  footprint: "gb"               # "gb" | "uk" | "england" | "england_wales" | "london"
  region_code: "E12000007"      # London region (GSS code) — used when footprint=london
  unit: "LSOA"                  # modelling + display unit (LSOA in E+W, DZ in S, SOA in NI)
  lsoa_vintage: "2011"          # matches IMD 2019; Scotland DZ also 2011
  bbox_wgs84: [-8.65, 49.86, 1.77, 60.86]   # UK bbox (was London-only)
  # NI deferred: data.police.uk has no NI crime and STATS19 excludes NI, so an NI
  # area would carry only 2 of 4 features. Add northern_ireland here once an NI
  # crime/collision source is wired (see implementation_plan.md "Defer NI").
  nations:
    - england
    - wales
    - scotland

data_years:
  crime_months_back: 36         # was 12; 36 smooths seasonality (E+W only via data.police.uk)
  stats19_years: [2021, 2022, 2023, 2024]

risk_index:
  normalisation: "percentile"   # percentile | zscore | minmax
  weights:                      # expert defaults; can be back-fit during calibration
    vehicle_crime: 0.40
    road_casualties: 0.30
    deprivation: 0.18
    population_density: 0.12
  severity_weights:             # applied to STATS19 casualties
    slight: 1
    serious: 3
    fatal: 8
  buckets: 5                    # quintiles for the legend
  missing_feature_strategy: "reweight"   # reweight | zero — how to handle NaN features (S/NI crime)

calibration:
  panel_csv: "data/manual/wtw_anchors_panel.csv"  # 137-row multi-quarter panel
  method: "ols"                # ols | ridge | lasso
  holdout: true                # run leave-one-area-out CV
  temporal_backtest: true      # fit on quarters ≤T, predict T+1
  quarter_fixed_effects: true  # control for national premium trend
  cluster_by: "area_name"      # cluster SEs by area (repeated measures)

sources:
  police_api: "https://data.police.uk/api"
  stats19_landing: "https://www.data.gov.uk/dataset/cb7ae6f0-4be6-4935-9277-47e5ce24a11f/road-accidents-safety-data"
  imd2019: "https://www.gov.uk/government/statistics/english-indices-of-deprivation-2019"
  geoportal: "https://geoportal.statistics.gov.uk"
  wtw_index: "https://www.confused.com/car-insurance/price-index"

paths:
  raw: "data/raw"
  interim: "data/interim"
  processed: "data/processed"
  manual: "data/manual"
